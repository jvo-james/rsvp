<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#050505" />
  <title>Joe RSVP Admin</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <style>
    :root{
      --bg:#050505;
      --bg2:#0b0b0b;
      --panel:rgba(255,255,255,.045);
      --panel2:rgba(255,255,255,.07);
      --line:rgba(242,211,123,.14);
      --text:#f8f3ea;
      --muted:rgba(248,243,234,.7);
      --gold:#f2d37b;
      --gold2:#d6b15a;
      --shadow:0 20px 70px rgba(0,0,0,.52);
      --r:24px;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
    body{
      margin:0;
      min-height:100svh;
      background:
        radial-gradient(circle at 18% 18%, rgba(242,211,123,.10), transparent 18%),
        radial-gradient(circle at 82% 16%, rgba(214,177,90,.08), transparent 18%),
        linear-gradient(180deg, #040404 0%, #070707 55%, #050505 100%);
      color:var(--text);
      font-family:"Inter",sans-serif;
      overflow-x:hidden;
    }

    a{color:inherit;text-decoration:none}
    button,input{font:inherit}

    .bg{
      position:fixed;
      inset:0;
      pointer-events:none;
      overflow:hidden;
      z-index:-1;
    }

    .grid{
      position:absolute;
      inset:-20%;
      opacity:.12;
      background-image:
        linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
      background-size:64px 64px;
      mask-image:radial-gradient(circle at center, black 25%, transparent 80%);
    }

    .glow{
      position:absolute;
      inset:0;
      filter:blur(18px);
      opacity:.9;
      background:
        radial-gradient(circle at 50% 30%, rgba(242,211,123,.12), transparent 24%),
        radial-gradient(circle at 12% 82%, rgba(214,177,90,.08), transparent 20%),
        radial-gradient(circle at 84% 20%, rgba(242,211,123,.06), transparent 18%);
      animation: drift 12s ease-in-out infinite alternate;
    }

    .noise{
      position:absolute;
      inset:0;
      opacity:.06;
      background-image:
        linear-gradient(0deg, rgba(255,255,255,.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
      background-size:4px 4px;
      mix-blend-mode:screen;
    }

    .shell{
      width:min(860px, calc(100% - 20px));
      margin:0 auto;
      padding:12px 0 18px;
      min-height:100svh;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .topbar,
    .panel{
      border:1px solid var(--line);
      border-radius:28px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025)),
        rgba(10,10,10,.74);
      box-shadow:var(--shadow);
      backdrop-filter:blur(14px);
      position:relative;
      overflow:hidden;
    }

    .topbar::before,
    .panel::before{
      content:"";
      position:absolute;
      inset:10px;
      border-radius:20px;
      border:1px solid rgba(242,211,123,.08);
      pointer-events:none;
    }

    .topbar{
      padding:14px 14px 12px;
    }

    .title{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .eyebrow{
      width:fit-content;
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:7px 11px;
      border-radius:999px;
      border:1px solid rgba(242,211,123,.14);
      background:rgba(255,255,255,.035);
      color:rgba(242,211,123,.92);
      text-transform:uppercase;
      letter-spacing:.2em;
      font-size:.66rem;
    }

    h1{
      margin:0;
      font-family:"Cinzel",serif;
      font-size:clamp(1.6rem, 4vw, 2.7rem);
      line-height:1;
      letter-spacing:.02em;
      text-wrap:balance;
    }

    .sub{
      margin:0;
      color:var(--muted);
      line-height:1.5;
      font-size:.93rem;
      max-width:56ch;
      text-wrap:balance;
    }

    .controls{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:12px;
    }

    .btn{
      appearance:none;
      border:none;
      min-height:40px;
      padding:0 12px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      font-weight:700;
      font-size:.9rem;
      cursor:pointer;
      transition:transform .16s ease, box-shadow .16s ease, background .16s ease, border-color .16s ease;
      white-space:normal;
      flex:1 1 150px;
    }

    .btn:active{transform:translateY(1px)}

    .btn.primary{
      color:#120d02;
      background:linear-gradient(135deg, #fff3c7 0%, #d9b458 48%, #9f7b2b 100%);
      box-shadow:0 14px 30px rgba(242,211,123,.14), inset 0 1px 0 rgba(255,255,255,.42);
    }

    .btn.secondary{
      color:var(--text);
      background:rgba(255,255,255,.035);
      border:1px solid rgba(242,211,123,.16);
    }

    .btn.secondary:hover{
      background:rgba(255,255,255,.05);
      border-color:rgba(242,211,123,.26);
    }

    .panel{
      padding:14px;
      display:flex;
      flex-direction:column;
      gap:12px;
      min-height:0;
      flex:1;
    }

    .summary{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      padding:2px 4px 0;
    }

    .summary .count{
      font-family:"Cinzel",serif;
      font-size:1.15rem;
      letter-spacing:.02em;
    }

    .summary .hint{
      color:var(--muted);
      font-size:.84rem;
    }

    .list{
      margin:0;
      padding:0;
      list-style:none;
      display:grid;
      gap:8px;
    }

    .row{
      display:flex;
      gap:10px;
      align-items:flex-start;
      padding:12px 12px;
      border-radius:18px;
      background:rgba(255,255,255,.03);
      border:1px solid rgba(242,211,123,.1);
    }

    .num{
      min-width:28px;
      height:28px;
      border-radius:999px;
      display:inline-grid;
      place-items:center;
      flex:0 0 auto;
      font-weight:800;
      font-size:.84rem;
      color:#120d02;
      background:linear-gradient(135deg, #fff3c7, #d9b458 55%, #9f7b2b);
    }

    .name{
      font-weight:700;
      line-height:1.45;
      overflow-wrap:anywhere;
    }

    .empty{
      padding:26px 18px;
      border-radius:18px;
      border:1px dashed rgba(242,211,123,.18);
      color:var(--muted);
      line-height:1.6;
      text-align:center;
    }

    .footer{
      padding:0 6px;
      color:rgba(248,243,234,.45);
      text-align:center;
      font-size:.78rem;
      letter-spacing:.14em;
      text-transform:uppercase;
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:18px;
      transform:translate(-50%, 18px);
      display:inline-flex;
      align-items:center;
      gap:10px;
      max-width:min(92vw, 360px);
      padding:12px 14px;
      border-radius:999px;
      background:rgba(10,10,10,.94);
      border:1px solid rgba(242,211,123,.18);
      color:var(--text);
      box-shadow:var(--shadow);
      opacity:0;
      transition:opacity .2s ease, transform .2s ease;
      z-index:9999;
      backdrop-filter:blur(12px);
    }

    .toast.show{
      opacity:1;
      transform:translate(-50%, 0);
    }

    .toast__icon{
      width:22px;
      height:22px;
      border-radius:999px;
      display:inline-grid;
      place-items:center;
      background:linear-gradient(135deg, #fff3c7, #d9b458);
      color:#120d02;
      font-size:.8rem;
      font-weight:900;
      flex:0 0 auto;
    }

    .toast__text{
      font-size:.92rem;
      text-wrap:balance;
    }

    @keyframes drift{
      0%{transform:translate3d(0,0,0) scale(1)}
      100%{transform:translate3d(12px,-8px,0) scale(1.03)}
    }

    @media (max-width: 520px){
      .shell{
        width:calc(100% - 10px);
        padding-top:8px;
        gap:10px;
      }

      .topbar,
      .panel{
        border-radius:22px;
      }

      .topbar{
        padding:12px;
      }

      .panel{
        padding:12px;
      }

      .controls{
        gap:8px;
      }

      .btn{
        flex:1 1 100%;
        min-height:38px;
        font-size:.88rem;
      }

      .summary{
        flex-direction:column;
        align-items:flex-start;
      }

      .row{
        padding:11px 11px;
      }

      .name{
        font-size:.96rem;
      }
    }

    @media (prefers-reduced-motion: reduce){
      html{scroll-behavior:auto}
      *,*::before,*::after{
        animation-duration:.001ms !important;
        animation-iteration-count:1 !important;
        transition-duration:.001ms !important;
      }
    }
    .guest-row{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:14px 14px;
  border-radius:18px;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(242,211,123,.1);
  overflow:visible;
}

.guest-row__left{
  display:flex;
  align-items:center;
  gap:10px;
  min-width:0;
  flex:1;
}

.guest-row__name{
  font-weight:700;
  color:var(--text);
  overflow-wrap:anywhere;
  line-height:1.35;
}

.guest-row__menu-wrap{
  position:relative;
  flex:0 0 auto;
}

.guest-row__more{
  width:34px;
  height:34px;
  border-radius:999px;
  border:1px solid rgba(242,211,123,.14);
  background:rgba(255,255,255,.03);
  color:rgba(247,242,232,.9);
  display:grid;
  place-items:center;
  cursor:pointer;
  transition:transform .16s ease, background .16s ease, border-color .16s ease;
  flex:0 0 auto;
}

.guest-row__more:hover{
  transform:translateY(-1px);
  background:rgba(255,255,255,.06);
  border-color:rgba(242,211,123,.24);
}

.guest-menu{
  position:absolute;
  right:0;
  top:calc(100% + 8px);
  min-width:132px;
  padding:8px;
  border-radius:16px;
  background:rgba(10,10,10,.96);
  border:1px solid rgba(242,211,123,.16);
  box-shadow:0 18px 50px rgba(0,0,0,.45);
  backdrop-filter:blur(14px);
  display:none;
  z-index:30;
}

.guest-menu.is-open{
  display:block;
}

.guest-menu--up{
  top:auto;
  bottom:calc(100% + 8px);
}

.guest-menu__item{
  width:100%;
  border:none;
  background:transparent;
  color:rgba(247,242,232,.95);
  display:flex;
  align-items:center;
  justify-content:flex-start;
  gap:10px;
  padding:10px 10px;
  border-radius:12px;
  cursor:pointer;
  font-weight:700;
  font-size:.9rem;
  text-align:left;
}

.guest-menu__item:hover{
  background:rgba(255,255,255,.05);
}

.guest-menu__item i{
  color:rgba(242,211,123,.9);
}

.delete-modal{
  position:fixed;
  inset:0;
  display:none;
  place-items:center;
  padding:18px;
  z-index:9999;
}

.delete-modal.is-open{
  display:grid;
}

.delete-modal__backdrop{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.56);
  backdrop-filter:blur(8px);
}

.delete-modal__card{
  position:relative;
  z-index:1;
  width:min(100%, 420px);
  border-radius:28px;
  padding:22px 18px 18px;
  background:
    radial-gradient(circle at 50% 0%, rgba(242,211,123,.14), transparent 26%),
    linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.03)),
    rgba(10,10,10,.95);
  border:1px solid rgba(242,211,123,.16);
  box-shadow:0 28px 90px rgba(0,0,0,.6);
  text-align:center;
  transform:translateY(8px) scale(.98);
  animation: modalIn .18s ease forwards;
}

.delete-modal__icon{
  width:56px;
  height:56px;
  margin:0 auto 12px;
  border-radius:999px;
  display:grid;
  place-items:center;
  background:linear-gradient(135deg, #fff3c7, #d9b458 55%, #9f7b2b);
  color:#130d02;
  box-shadow:0 16px 32px rgba(242,211,123,.14);
  font-size:1.2rem;
}

.delete-modal__eyebrow{
  margin:0 0 8px;
  color:rgba(242,211,123,.9);
  letter-spacing:.22em;
  text-transform:uppercase;
  font-size:.68rem;
}

.delete-modal__title{
  margin:0;
  font-family:"Cinzel",serif;
  font-size:clamp(1.3rem, 3.6vw, 1.8rem);
  line-height:1.1;
  text-wrap:balance;
}

.delete-modal__text{
  margin:12px 0 0;
  color:var(--muted);
  line-height:1.6;
  font-size:.95rem;
  text-wrap:pretty;
}

.delete-modal__actions{
  display:flex;
  gap:10px;
  margin-top:18px;
}

.delete-modal__btn{
  flex:1 1 0;
  min-height:42px;
  border-radius:999px;
  border:1px solid transparent;
  cursor:pointer;
  font-weight:800;
  font-size:.9rem;
}

.delete-modal__btn--ghost{
  background:rgba(255,255,255,.04);
  color:var(--text);
  border-color:rgba(242,211,123,.14);
}

.delete-modal__btn--danger{
  color:#120d02;
  background:linear-gradient(135deg, #fff3c7, #d9b458 55%, #9f7b2b);
}

@keyframes modalIn{
  from{transform:translateY(12px) scale(.96); opacity:0}
  to{transform:translateY(0) scale(1); opacity:1}
}

@media (max-width: 520px){
  .guest-row{
    padding:12px;
  }

  .guest-row__more{
    width:32px;
    height:32px;
  }

  .guest-menu{
    min-width:124px;
  }

  .delete-modal__card{
    border-radius:24px;
    padding:20px 14px 14px;
  }

  .delete-modal__actions{
    gap:8px;
  }

  .delete-modal__btn{
    min-height:40px;
    font-size:.88rem;
  }
}

@media (prefers-reduced-motion: reduce){
  .delete-modal__card{
    animation:none;
    transform:none;
  }
}
  </style>
</head>
<body>
  <div class="bg" aria-hidden="true">
    <div class="grid"></div>
    <div class="glow"></div>
    <div class="noise"></div>
  </div>

  <main class="shell">
    <header class="topbar">
      <div class="title">
        <span class="eyebrow"><i class="fa-solid fa-crown"></i> Admin</span>
        <h1>Joe’s attending list</h1>
        <p class="sub">A simple live list of the guests who confirmed they are coming.</p>
      </div>

      <div class="controls">
        <button class="btn secondary" id="copyBtn" type="button">
          <i class="fa-regular fa-copy"></i>
          Copy everything
        </button>
        <button class="btn primary" id="exportBtn" type="button">
          <i class="fa-solid fa-file-excel"></i>
          Export to Excel
        </button>
      </div>
    </header>

    <section class="panel" aria-label="Attending guests">
      <div class="summary">
        <div class="count"><span id="guestCount">0</span> attending</div>
        <div class="hint"></div>
      </div>

      <ol class="list" id="guestList">
        <li class="empty" id="emptyState">No one has RSVP’d yet.</li>
      </ol>
    </section>

    <div class="footer">Joe’s surprise dinner</div>
  <div class="delete-modal" id="deleteModal" aria-hidden="true">
  <div class="delete-modal__backdrop" data-close-modal></div>

  <div class="delete-modal__card" role="dialog" aria-modal="true" aria-labelledby="deleteModalTitle">
    <div class="delete-modal__icon" aria-hidden="true">
      <i class="fa-solid fa-triangle-exclamation"></i>
    </div>

    <p class="delete-modal__eyebrow">Remove guest</p>
    <h3 class="delete-modal__title" id="deleteModalTitle">Are you sure?</h3>
    <p class="delete-modal__text" id="deleteModalText">
      Are you sure you want to remove this guest from the guests list?
    </p>

    <div class="delete-modal__actions">
      <button class="delete-modal__btn delete-modal__btn--ghost" type="button" id="cancelDeleteBtn">
        No
      </button>
      <button class="delete-modal__btn delete-modal__btn--danger" type="button" id="confirmDeleteBtn">
        Yes, remove
      </button>
    </div>
  </div>
</div>
  </main>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    const appConfig = {
      apiKey: "AIzaSyCBoxz_Lgl7UXoMZZM2noBgR8NTu90LA0g",
      authDomain: "joe-birthday-dinner-2cf3f.firebaseapp.com",
      projectId: "joe-birthday-dinner-2cf3f",
      storageBucket: "joe-birthday-dinner-2cf3f.firebasestorage.app",
      messagingSenderId: "1040931514557",
      appId: "1:1040931514557:web:0d9e67a9be1c2da66bafd4"
    };

    const {
      initializeApp
    } = window.firebaseApp;
    const {
      getFirestore,
      collection,
      onSnapshot,
      query,
      orderBy,
      deleteDoc,
      doc
    } = window.firebaseFirestore;

    const app = initializeApp(appConfig);
    const db = getFirestore(app);

    const guestList = document.getElementById("guestList");
    const guestCount = document.getElementById("guestCount");
    const emptyState = document.getElementById("emptyState");

    const deleteModal = document.getElementById("deleteModal");
    const deleteModalText = document.getElementById("deleteModalText");
    const confirmDeleteBtn = document.getElementById("confirmDeleteBtn");
    const cancelDeleteBtn = document.getElementById("cancelDeleteBtn");

    let currentItems = [];
    let openMenu = null;
    let openMenuButton = null;
    let pendingDelete = null;

    function closeMenus() {
      document.querySelectorAll(".guest-menu.is-open").forEach((menu) => {
        menu.classList.remove("is-open", "guest-menu--up");
      });

      document.querySelectorAll(".guest-row__more[aria-expanded='true']").forEach((btn) => {
        btn.setAttribute("aria-expanded", "false");
      });

      openMenu = null;
      openMenuButton = null;
    }

    function openDeleteModal(item) {
      pendingDelete = item;
      deleteModalText.textContent = `Are you sure you want to remove ${item.name} from the guests list?`;
      deleteModal.classList.add("is-open");
      deleteModal.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }

    function closeDeleteModal() {
      pendingDelete = null;
      deleteModal.classList.remove("is-open");
      deleteModal.setAttribute("aria-hidden", "true");
      document.body.style.overflow = "";
    }

    function render(items) {
      currentItems = items.slice();
      guestCount.textContent = String(items.length);
      guestList.innerHTML = "";

      if (!items.length) {
        const li = document.createElement("li");
        li.className = "empty";
        li.id = "emptyState";
        li.textContent = "No one has RSVP’d yet.";
        guestList.appendChild(li);
        return;
      }

      items.forEach((item, index) => {
        const li = document.createElement("li");
        li.className = "guest-row";
        li.dataset.id = item.id;
        li.dataset.name = item.name;

        li.innerHTML = `
          <div class="guest-row__left">
            <span class="num">${index + 1}</span>
            <span class="guest-row__name"></span>
          </div>

          <div class="guest-row__menu-wrap">
            <button class="guest-row__more" type="button" aria-haspopup="true" aria-expanded="false" aria-label="Open menu for ${item.name}">
              <i class="fa-solid fa-ellipsis-vertical"></i>
            </button>

            <div class="guest-menu" role="menu" aria-label="Actions for ${item.name}">
              <button class="guest-menu__item" type="button" data-action="remove">
                <i class="fa-solid fa-trash"></i>
                Remove
              </button>
            </div>
          </div>
        `;

        li.querySelector(".guest-row__name").textContent = item.name;
        guestList.appendChild(li);
      });
    }

    function positionMenu(menu, button) {
      const row = button.closest(".guest-row");
      if (!row) return;

      requestAnimationFrame(() => {
        const rowRect = row.getBoundingClientRect();
        const menuRect = menu.getBoundingClientRect();
        const spaceBelow = window.innerHeight - rowRect.bottom;
        const shouldOpenUp = spaceBelow < menuRect.height + 20;

        menu.classList.toggle("guest-menu--up", shouldOpenUp);
      });
    }

    guestList.addEventListener("click", (e) => {
      const moreBtn = e.target.closest(".guest-row__more");
      const removeBtn = e.target.closest(".guest-menu__item[data-action='remove']");
      const row = e.target.closest(".guest-row");

      if (moreBtn && row) {
        e.stopPropagation();
        const menu = row.querySelector(".guest-menu");

        if (openMenu && openMenu !== menu) {
          closeMenus();
        }

        const isOpen = menu.classList.contains("is-open");
        closeMenus();

        if (!isOpen) {
          menu.classList.add("is-open");
          moreBtn.setAttribute("aria-expanded", "true");
          openMenu = menu;
          openMenuButton = moreBtn;
          positionMenu(menu, moreBtn);
        }

        return;
      }

      if (removeBtn && row) {
        e.stopPropagation();
        const item = {
          id: row.dataset.id,
          name: row.dataset.name
        };

        closeMenus();
        openDeleteModal(item);
      }
    });

    document.addEventListener("click", (e) => {
      const clickedInsideMenu = e.target.closest(".guest-menu");
      const clickedMore = e.target.closest(".guest-row__more");

      if (!clickedInsideMenu && !clickedMore) {
        closeMenus();
      }
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        closeMenus();
        closeDeleteModal();
      }
    });

    deleteModal.addEventListener("click", (e) => {
      if (e.target.matches("[data-close-modal]")) {
        closeDeleteModal();
      }
    });

    cancelDeleteBtn.addEventListener("click", closeDeleteModal);

    confirmDeleteBtn.addEventListener("click", async () => {
      if (!pendingDelete) return;

      try {
        await deleteDoc(doc(db, "rsvps", pendingDelete.id));
        closeDeleteModal();
      } catch (error) {
        console.error("Delete failed:", error);
        alert("Could not remove that guest.");
      }
    });

    onSnapshot(
      query(collection(db, "rsvps"), orderBy("createdAt", "desc")),
      (snapshot) => {
        const items = [];

        snapshot.forEach((docSnap) => {
          const data = docSnap.data() || {};
          if (data.attending) {
            const name = String(data.name || "Unnamed guest").trim();
            items.push({
              id: docSnap.id,
              name: name || "Unnamed guest"
            });
          }
        });

        render(items);

        if (emptyState) {
          emptyState.style.display = items.length ? "none" : "block";
        }
      },
      (error) => {
        console.error("Failed to load RSVPs:", error);
      }
    );

    window.addEventListener("resize", () => {
      if (openMenu && openMenuButton) {
        positionMenu(openMenu, openMenuButton);
      }
    });
  });
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore,
    collection,
    onSnapshot,
    query,
    orderBy,
    deleteDoc,
    doc
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  window.firebaseApp = { initializeApp };
  window.firebaseFirestore = {
    getFirestore,
    collection,
    onSnapshot,
    query,
    orderBy,
    deleteDoc,
    doc
  };
</script>
</body>
</html>
