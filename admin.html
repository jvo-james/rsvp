<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#050505" />
  <title>Joe RSVP Admin</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <style>
    :root{
      --bg:#050505;
      --bg2:#0b0b0b;
      --panel:rgba(255,255,255,.045);
      --panel2:rgba(255,255,255,.07);
      --line:rgba(242,211,123,.14);
      --text:#f8f3ea;
      --muted:rgba(248,243,234,.7);
      --gold:#f2d37b;
      --gold2:#d6b15a;
      --shadow:0 20px 70px rgba(0,0,0,.52);
      --r:24px;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
    body{
      margin:0;
      min-height:100svh;
      background:
        radial-gradient(circle at 18% 18%, rgba(242,211,123,.10), transparent 18%),
        radial-gradient(circle at 82% 16%, rgba(214,177,90,.08), transparent 18%),
        linear-gradient(180deg, #040404 0%, #070707 55%, #050505 100%);
      color:var(--text);
      font-family:"Inter",sans-serif;
      overflow-x:hidden;
    }

    a{color:inherit;text-decoration:none}
    button,input{font:inherit}

    .bg{
      position:fixed;
      inset:0;
      pointer-events:none;
      overflow:hidden;
      z-index:-1;
    }

    .grid{
      position:absolute;
      inset:-20%;
      opacity:.12;
      background-image:
        linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
      background-size:64px 64px;
      mask-image:radial-gradient(circle at center, black 25%, transparent 80%);
    }

    .glow{
      position:absolute;
      inset:0;
      filter:blur(18px);
      opacity:.9;
      background:
        radial-gradient(circle at 50% 30%, rgba(242,211,123,.12), transparent 24%),
        radial-gradient(circle at 12% 82%, rgba(214,177,90,.08), transparent 20%),
        radial-gradient(circle at 84% 20%, rgba(242,211,123,.06), transparent 18%);
      animation: drift 12s ease-in-out infinite alternate;
    }

    .noise{
      position:absolute;
      inset:0;
      opacity:.06;
      background-image:
        linear-gradient(0deg, rgba(255,255,255,.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
      background-size:4px 4px;
      mix-blend-mode:screen;
    }

    .shell{
      width:min(860px, calc(100% - 20px));
      margin:0 auto;
      padding:12px 0 18px;
      min-height:100svh;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .topbar,
    .panel{
      border:1px solid var(--line);
      border-radius:28px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025)),
        rgba(10,10,10,.74);
      box-shadow:var(--shadow);
      backdrop-filter:blur(14px);
      position:relative;
      overflow:hidden;
    }

    .topbar::before,
    .panel::before{
      content:"";
      position:absolute;
      inset:10px;
      border-radius:20px;
      border:1px solid rgba(242,211,123,.08);
      pointer-events:none;
    }

    .topbar{
      padding:14px 14px 12px;
    }

    .title{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .eyebrow{
      width:fit-content;
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:7px 11px;
      border-radius:999px;
      border:1px solid rgba(242,211,123,.14);
      background:rgba(255,255,255,.035);
      color:rgba(242,211,123,.92);
      text-transform:uppercase;
      letter-spacing:.2em;
      font-size:.66rem;
    }

    h1{
      margin:0;
      font-family:"Cinzel",serif;
      font-size:clamp(1.6rem, 4vw, 2.7rem);
      line-height:1;
      letter-spacing:.02em;
      text-wrap:balance;
    }

    .sub{
      margin:0;
      color:var(--muted);
      line-height:1.5;
      font-size:.93rem;
      max-width:56ch;
      text-wrap:balance;
    }

    .controls{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:12px;
    }

    .btn{
      appearance:none;
      border:none;
      min-height:40px;
      padding:0 12px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      font-weight:700;
      font-size:.9rem;
      cursor:pointer;
      transition:transform .16s ease, box-shadow .16s ease, background .16s ease, border-color .16s ease;
      white-space:normal;
      flex:1 1 150px;
    }

    .btn:active{transform:translateY(1px)}

    .btn.primary{
      color:#120d02;
      background:linear-gradient(135deg, #fff3c7 0%, #d9b458 48%, #9f7b2b 100%);
      box-shadow:0 14px 30px rgba(242,211,123,.14), inset 0 1px 0 rgba(255,255,255,.42);
    }

    .btn.secondary{
      color:var(--text);
      background:rgba(255,255,255,.035);
      border:1px solid rgba(242,211,123,.16);
    }

    .btn.secondary:hover{
      background:rgba(255,255,255,.05);
      border-color:rgba(242,211,123,.26);
    }

    .panel{
      padding:14px;
      display:flex;
      flex-direction:column;
      gap:12px;
      min-height:0;
      flex:1;
    }

    .summary{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      padding:2px 4px 0;
    }

    .summary .count{
      font-family:"Cinzel",serif;
      font-size:1.15rem;
      letter-spacing:.02em;
    }

    .summary .hint{
      color:var(--muted);
      font-size:.84rem;
    }

    .list{
      margin:0;
      padding:0;
      list-style:none;
      display:grid;
      gap:8px;
    }

    .row{
      display:flex;
      gap:10px;
      align-items:flex-start;
      padding:12px 12px;
      border-radius:18px;
      background:rgba(255,255,255,.03);
      border:1px solid rgba(242,211,123,.1);
    }

    .num{
      min-width:28px;
      height:28px;
      border-radius:999px;
      display:inline-grid;
      place-items:center;
      flex:0 0 auto;
      font-weight:800;
      font-size:.84rem;
      color:#120d02;
      background:linear-gradient(135deg, #fff3c7, #d9b458 55%, #9f7b2b);
    }

    .name{
      font-weight:700;
      line-height:1.45;
      overflow-wrap:anywhere;
    }

    .empty{
      padding:26px 18px;
      border-radius:18px;
      border:1px dashed rgba(242,211,123,.18);
      color:var(--muted);
      line-height:1.6;
      text-align:center;
    }

    .footer{
      padding:0 6px;
      color:rgba(248,243,234,.45);
      text-align:center;
      font-size:.78rem;
      letter-spacing:.14em;
      text-transform:uppercase;
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:18px;
      transform:translate(-50%, 18px);
      display:inline-flex;
      align-items:center;
      gap:10px;
      max-width:min(92vw, 360px);
      padding:12px 14px;
      border-radius:999px;
      background:rgba(10,10,10,.94);
      border:1px solid rgba(242,211,123,.18);
      color:var(--text);
      box-shadow:var(--shadow);
      opacity:0;
      transition:opacity .2s ease, transform .2s ease;
      z-index:9999;
      backdrop-filter:blur(12px);
    }

    .toast.show{
      opacity:1;
      transform:translate(-50%, 0);
    }

    .toast__icon{
      width:22px;
      height:22px;
      border-radius:999px;
      display:inline-grid;
      place-items:center;
      background:linear-gradient(135deg, #fff3c7, #d9b458);
      color:#120d02;
      font-size:.8rem;
      font-weight:900;
      flex:0 0 auto;
    }

    .toast__text{
      font-size:.92rem;
      text-wrap:balance;
    }

    @keyframes drift{
      0%{transform:translate3d(0,0,0) scale(1)}
      100%{transform:translate3d(12px,-8px,0) scale(1.03)}
    }

    @media (max-width: 520px){
      .shell{
        width:calc(100% - 10px);
        padding-top:8px;
        gap:10px;
      }

      .topbar,
      .panel{
        border-radius:22px;
      }

      .topbar{
        padding:12px;
      }

      .panel{
        padding:12px;
      }

      .controls{
        gap:8px;
      }

      .btn{
        flex:1 1 100%;
        min-height:38px;
        font-size:.88rem;
      }

      .summary{
        flex-direction:column;
        align-items:flex-start;
      }

      .row{
        padding:11px 11px;
      }

      .name{
        font-size:.96rem;
      }
    }

    @media (prefers-reduced-motion: reduce){
      html{scroll-behavior:auto}
      *,*::before,*::after{
        animation-duration:.001ms !important;
        animation-iteration-count:1 !important;
        transition-duration:.001ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="bg" aria-hidden="true">
    <div class="grid"></div>
    <div class="glow"></div>
    <div class="noise"></div>
  </div>

  <main class="shell">
    <header class="topbar">
      <div class="title">
        <span class="eyebrow"><i class="fa-solid fa-crown"></i> Admin</span>
        <h1>Joe’s attending list</h1>
        <p class="sub">A simple live list of the guests who confirmed they are coming.</p>
      </div>

      <div class="controls">
        <button class="btn secondary" id="copyBtn" type="button">
          <i class="fa-regular fa-copy"></i>
          Copy everything
        </button>
        <button class="btn primary" id="exportBtn" type="button">
          <i class="fa-solid fa-file-excel"></i>
          Export to Excel
        </button>
      </div>
    </header>

    <section class="panel" aria-label="Attending guests">
      <div class="summary">
        <div class="count"><span id="guestCount">0</span> attending</div>
        <div class="hint"></div>
      </div>

      <ol class="list" id="guestList">
        <li class="empty" id="emptyState">No one has RSVP’d yet.</li>
      </ol>
    </section>

    <div class="footer">Joe’s surprise dinner</div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore,
      collection,
      onSnapshot,
      query,
      orderBy
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCBoxz_Lgl7UXoMZZM2noBgR8NTu90LA0g",
      authDomain: "joe-birthday-dinner-2cf3f.firebaseapp.com",
      projectId: "joe-birthday-dinner-2cf3f",
      storageBucket: "joe-birthday-dinner-2cf3f.firebasestorage.app",
      messagingSenderId: "1040931514557",
      appId: "1:1040931514557:web:0d9e67a9be1c2da66bafd4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const guestList = document.getElementById("guestList");
    const guestCount = document.getElementById("guestCount");
    const emptyState = document.getElementById("emptyState");
    const copyBtn = document.getElementById("copyBtn");
    const exportBtn = document.getElementById("exportBtn");

    let currentNames = [];

    function toast(message) {
      const existing = document.querySelector(".toast");
      if (existing) existing.remove();

      const el = document.createElement("div");
      el.className = "toast";
      el.setAttribute("role", "status");
      el.setAttribute("aria-live", "polite");
      el.innerHTML = `
        <span class="toast__icon"><i class="fa-solid fa-check"></i></span>
        <span class="toast__text"></span>
      `;
      el.querySelector(".toast__text").textContent = message;
      document.body.appendChild(el);

      requestAnimationFrame(() => el.classList.add("show"));

      setTimeout(() => {
        el.classList.remove("show");
        setTimeout(() => el.remove(), 220);
      }, 1800);
    }

    function copyToClipboard(text) {
      return navigator.clipboard?.writeText(text).catch(() => {
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.setAttribute("readonly", "");
        ta.style.position = "fixed";
        ta.style.left = "-9999px";
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        ta.remove();
      });
    }

    function render(names) {
      currentNames = names.slice();

      guestCount.textContent = String(names.length);
      guestList.innerHTML = "";

      if (!names.length) {
        const li = document.createElement("li");
        li.className = "empty";
        li.id = "emptyState";
        li.textContent = "No one has RSVP’d yet.";
        guestList.appendChild(li);
        return;
      }

      names.forEach((name, index) => {
        const li = document.createElement("li");
        li.className = "row";
        li.innerHTML = `
          <span class="num">${index + 1}</span>
          <span class="name"></span>
        `;
        li.querySelector(".name").textContent = name;
        guestList.appendChild(li);
      });
    }

    function exportExcel(names) {
      if (!window.XLSX) {
        toast("Excel library did not load.");
        return;
      }

      const rows = names.map((name, index) => ({
        "#": index + 1,
        Name: name
      }));

      const ws = XLSX.utils.json_to_sheet(rows);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Attending");
      XLSX.writeFile(wb, "joe-attending-list.xlsx");
    }

    onSnapshot(
      query(collection(db, "rsvps"), orderBy("createdAt", "desc")),
      (snapshot) => {
        const names = [];

        snapshot.forEach((docSnap) => {
          const data = docSnap.data() || {};
          if (data.attending) {
            const name = String(data.name || "Unnamed guest").trim();
            names.push(name || "Unnamed guest");
          }
        });

        render(names);
      },
      (error) => {
        console.error("Failed to load RSVPs:", error);
        toast("Could not load the guest list.");
      }
    );

    copyBtn.addEventListener("click", async () => {
      const text = currentNames.length
        ? currentNames.map((name, index) => `${index + 1}. ${name}`).join("\\n")
        : "No attending guests yet.";

      try {
        await copyToClipboard(text);
        toast("Copied to clipboard.");
      } catch (error) {
        console.error("Copy failed:", error);
        toast("Copy failed.");
      }
    });

    exportBtn.addEventListener("click", () => {
      try {
        exportExcel(currentNames);
        toast("Excel file downloaded.");
      } catch (error) {
        console.error("Export failed:", error);
        toast("Export failed.");
      }
    });
  </script>
</body>
</html>
